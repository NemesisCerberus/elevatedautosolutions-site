<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ElevatED Automotive Solutions | AI-Powered Training for the Modern Shop & Classroom</title>
  <meta name="description" content="AI-powered training, consulting, and technology integration for automotive education and industry. Educate. Elevate. Excel." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' ry='18' fill='%233B82F6'/><text x='50' y='58' font-size='52' text-anchor='middle' fill='white' font-family='Arial, Helvetica, sans-serif'>EA</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Dark navy base palette — matches tablecloth & ShopCommand apps */
      --navy-deepest: #060d1a;
      --navy-dark: #0a1628;
      --navy-base: #0f1d32;
      --navy-light: #162544;
      --navy-card: #1a2d50;

      /* Blues — electric accent from branding */
      --primary-blue: #3B82F6;
      --blue-dark: #2563EB;
      --blue-light: #60A5FA;
      --accent-cyan: #06B6D4;
      --accent-teal: #0891B2;

      /* Text */
      --text-primary: #F1F5F9;
      --text-secondary: #94A3B8;
      --text-muted: #64748B;

      /* Effects */
      --glow-blue: rgba(59, 130, 246, 0.4);
      --glow-cyan: rgba(6, 182, 212, 0.3);
      --border-subtle: rgba(59, 130, 246, 0.15);
      --border-hover: rgba(59, 130, 246, 0.4);
      --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.3);
      --shadow-hover: 0 20px 60px rgba(59, 130, 246, 0.25);
      --shadow-glow: 0 0 40px rgba(59, 130, 246, 0.15);
    }

    *, *::before, *::after { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      line-height: 1.7;
      color: var(--text-primary);
      font-weight: 400;
      background: var(--navy-deepest);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle hex/grid pattern overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%233B82F6' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.5;
      z-index: 0;
    }

    main { position: relative; z-index: 1; }

    a { color: inherit; text-decoration: none; transition: all 0.3s ease; }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 32px; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(2deg); }
    }

    @keyframes gentle-pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    @keyframes slide-in-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ========== HEADER ========== */
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(20px);
      background: rgba(10, 22, 40, 0.9);
      border-bottom: 1px solid var(--border-subtle);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform 0.3s ease;
    }

    .brand:hover { transform: translateX(5px); }

    .brand h1 {
      font-size: 26px;
      font-weight: 900;
      color: var(--text-secondary);
      margin: 0;
      letter-spacing: -1px;
    }

    .brand h1 span {
      color: var(--primary-blue);
    }

    .brand-logo {
      height: 70px;
      width: auto;
      transition: all 0.3s ease;
    }

    @media (max-width: 860px) {
      .brand h1 { font-size: 18px; }
      .brand-logo { height: 50px; }
    }

    .menu {
      display: flex;
      gap: 32px;
      font-weight: 600;
      font-size: 15px;
    }

    .menu a {
      color: var(--text-secondary);
      position: relative;
      padding: 8px 0;
      transition: color 0.3s ease;
    }

    .menu a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--primary-blue), var(--accent-cyan));
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .menu a:hover { color: var(--text-primary); }
    .menu a:hover::after { width: 100%; }

    .hamburger { display: none; }

    @media (max-width: 860px) {
      .menu { display: none; }
      .hamburger { display: inline-flex; }
    }

    /* ========== BADGE ========== */
    .badge {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 10px 20px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.12);
      color: var(--blue-light);
      font-weight: 800;
      font-size: 13px;
      border: 1px solid rgba(59, 130, 246, 0.25);
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.1);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ========== BUTTONS ========== */
    .btn {
      display: inline-flex;
      gap: 12px;
      align-items: center;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 17px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:hover::before { width: 400px; height: 400px; }

    .btn.primary {
      background: linear-gradient(135deg, var(--primary-blue) 0%, var(--blue-dark) 100%);
      color: white;
      box-shadow: 0 10px 30px var(--glow-blue);
    }

    .btn.primary:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 15px 50px var(--glow-blue);
    }

    .btn.secondary {
      background: rgba(59, 130, 246, 0.08);
      color: var(--blue-light);
      border-color: rgba(59, 130, 246, 0.3);
    }

    .btn.secondary:hover {
      background: rgba(59, 130, 246, 0.15);
      transform: translateY(-2px);
    }

    /* ========== HERO ========== */
    .hero {
      padding: 100px 0 120px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, 0.08), transparent 50%),
        radial-gradient(ellipse at 80% 30%, rgba(6, 182, 212, 0.06), transparent 40%),
        linear-gradient(180deg, var(--navy-dark) 0%, var(--navy-deepest) 100%);
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -30%; right: -10%;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.12), transparent 60%);
      border-radius: 50%;
      animation: gentle-pulse 5s ease-in-out infinite;
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -20%; left: -15%;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.08), transparent 70%);
      border-radius: 40% 60% 70% 30%;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      animation: slide-in-up 0.8s ease-out;
    }

    .hero h2 {
      font-size: 68px;
      line-height: 1.08;
      margin: 32px 0;
      font-weight: 900;
      color: var(--text-primary);
      letter-spacing: -2.5px;
      max-width: 900px;
    }

    .hero h2 span {
      background: linear-gradient(135deg, var(--primary-blue) 0%, var(--accent-cyan) 50%, var(--blue-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: inline-block;
    }

    .hero p {
      color: var(--text-secondary);
      font-size: 22px;
      max-width: 700px;
      line-height: 1.65;
      margin: 24px 0 40px;
      font-weight: 500;
    }

    .hero .tagline {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 48px;
    }

    .hero .tagline em {
      color: var(--accent-cyan);
      font-style: normal;
    }

    @media (max-width: 768px) {
      .hero h2 { font-size: 36px; }
      .hero { padding: 60px 0 80px; }
    }

    /* ========== ORGANIC SHAPES ========== */
    .organic-shape { position: absolute; pointer-events: none; opacity: 0.4; }

    .shape-1 {
      top: 10%; right: 5%;
      width: 200px; height: 200px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--primary-blue));
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      filter: blur(60px);
      animation: float 10s ease-in-out infinite;
    }

    .shape-2 {
      bottom: 20%; left: 8%;
      width: 150px; height: 150px;
      background: linear-gradient(135deg, var(--primary-blue), var(--blue-dark));
      border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%;
      filter: blur(50px);
      animation: float 7s ease-in-out infinite reverse;
    }

    /* ========== SECTIONS ========== */
    section { padding: 100px 0; position: relative; }

    .section-title {
      font-size: 13px;
      letter-spacing: 3.5px;
      color: var(--accent-cyan);
      text-transform: uppercase;
      margin: 0 0 16px;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title::before {
      content: '';
      width: 40px; height: 3px;
      background: linear-gradient(90deg, var(--primary-blue), var(--accent-cyan));
      border-radius: 2px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 32px;
      margin-bottom: 64px;
    }

    .section-head h3 {
      font-size: 48px;
      margin: 0;
      font-weight: 900;
      letter-spacing: -1.5px;
      color: var(--text-primary);
    }

    /* ========== FEATURES (Service Cards) ========== */
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 32px;
    }

    .feature {
      padding: 40px;
      border-radius: 20px;
      border: 1px solid var(--border-subtle);
      background: var(--navy-base);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
    }

    .feature::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary-blue), var(--accent-cyan), var(--blue-light));
      transform: scaleX(0);
      transition: transform 0.5s ease;
    }

    .feature:hover {
      transform: translateY(-8px);
      border-color: var(--border-hover);
      box-shadow: var(--shadow-hover);
    }

    .feature:hover::before { transform: scaleX(1); }

    .feature h4 {
      margin: 20px 0 12px;
      font-size: 26px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.8px;
    }

    .feature p {
      color: var(--text-secondary);
      margin: 0 0 16px;
      line-height: 1.8;
      font-size: 16px;
    }

    .feature ul {
      margin: 16px 0 0 20px;
      color: var(--text-secondary);
      line-height: 2;
    }

    .feature ul li { position: relative; padding-left: 8px; }
    .feature ul li::marker { color: var(--accent-cyan); }

    /* ========== CARD ========== */
    .card {
      background: var(--navy-base);
      border: 1px solid var(--border-subtle);
      border-radius: 24px;
      padding: 48px;
      box-shadow: var(--shadow-soft);
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: '';
      position: absolute;
      bottom: -30%; left: -20%;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.06), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .card h3 {
      font-size: 38px;
      margin: 0 0 24px;
      font-weight: 900;
      letter-spacing: -1.2px;
      color: var(--text-primary);
    }

    .card p {
      font-size: 18px;
      line-height: 1.9;
      color: var(--text-secondary);
    }

    .highlight-box {
      background: rgba(59, 130, 246, 0.08);
      border-left: 4px solid var(--primary-blue);
      padding: 24px;
      border-radius: 12px;
      margin: 24px 0;
    }

    .highlight-box strong { color: var(--accent-cyan); font-weight: 700; }

    /* ========== PRODUCT HIGHLIGHT ========== */
    .product-highlight-grid {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 64px;
      align-items: center;
    }

    .product-images {
      display: flex;
      flex-direction: column;
      gap: 24px;
      position: relative;
    }

    .product-images img {
      width: 100%;
      border-radius: 16px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border-subtle);
    }

    .feature-list {
      list-style: none;
      padding: 0;
      margin: 24px 0 32px;
      display: grid;
      gap: 16px;
    }

    .feature-list li {
      display: flex;
      align-items: start;
      gap: 12px;
      font-size: 16px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .feature-list li svg {
      flex-shrink: 0;
      margin-top: 5px;
      color: var(--accent-cyan);
    }

    /* ========== FEATURE CARD GRID ========== */
    .feature-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
      margin: 32px 0 36px;
    }

    .feature-card {
      background: var(--navy-card);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 24px;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .feature-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary-blue), var(--accent-cyan));
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .feature-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .feature-card:hover::before {
      opacity: 1;
    }

    .feature-card .fc-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      font-size: 22px;
      background: rgba(59, 130, 246, 0.1);
      color: var(--primary-blue);
    }

    .feature-card h4 {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-primary);
      margin: 0 0 8px;
      letter-spacing: -0.3px;
    }

    .feature-card p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin: 0;
    }

    @media (max-width: 768px) {
      .feature-card-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 480px) {
      .feature-card-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 992px) {
      .product-highlight-grid {
        grid-template-columns: 1fr;
        gap: 48px;
      }
      .product-images { order: -1; }
      .about-story-grid, .founders-grid {
        grid-template-columns: 1fr !important;
      }
    }

    /* ========== FOOTER ========== */
    footer {
      padding: 48px 0 64px;
      color: var(--text-muted);
      border-top: 1px solid var(--border-subtle);
      background: var(--navy-dark);
      position: relative;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: center;
    }

    .footer-tagline {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .footer-tagline em {
      color: var(--accent-cyan);
      font-style: normal;
    }

    .social {
      display: flex;
      gap: 16px;
    }

    .social a {
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--navy-base);
      border: 1px solid var(--border-subtle);
      transition: all 0.3s ease;
    }

    .social a:hover {
      background: var(--primary-blue);
      border-color: var(--primary-blue);
      transform: translateY(-4px) rotate(5deg);
      box-shadow: 0 8px 20px var(--glow-blue);
    }

    /* ========== DIVIDERS ========== */
    .section-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-subtle), transparent);
      margin: 0 auto;
      max-width: 800px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
